# Database Configuration file for QuickBite
# Choose between: sqlite (zero configuration, works instantly) or mysql

db.type=sqlite

# SQLite Connection Settings
db.sqlite.driver=org.sqlite.JDBC
db.sqlite.url=jdbc:sqlite:quickbite.db

# MySQL Connection Settings
db.mysql.driver=com.mysql.cj.jdbc.Driver
db.mysql.url=jdbc:mysql://localhost:3306/quickbite?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.mysql.username=root
db.mysql.password=admin
